<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Al Quran Brand Studio</title>
  <style>
    :root { color-scheme: light; font-family: Inter, Roboto, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #fbf9f3; color: #1b1a18; }
    header { padding: 28px clamp(20px, 5vw, 64px); border-bottom: 1px solid #ddd7ca; }
    h1 { margin: 0; font-family: Georgia, serif; font-size: clamp(28px, 4vw, 48px); }
    header p { margin: 8px 0 0; color: #69665f; }
    main { display: grid; grid-template-columns: minmax(320px, 1fr) minmax(300px, 420px); gap: 28px; padding: 28px clamp(20px, 5vw, 64px) 56px; }
    .preview { position: sticky; top: 20px; align-self: start; display: grid; gap: 16px; }
    .canvas { overflow: hidden; aspect-ratio: 1; border-radius: 28px; box-shadow: 0 18px 48px #153b2926; }
    svg { width: 100%; height: 100%; display: block; }
    .actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    button { min-height: 44px; border: 1px solid #00745c; border-radius: 999px; background: transparent; color: #006c51; font: inherit; font-weight: 700; cursor: pointer; }
    button.primary { background: #00745c; color: white; }
    .panel { display: grid; gap: 14px; }
    details { border: 1px solid #ddd7ca; border-radius: 14px; background: #fffdf8; overflow: hidden; }
    summary { padding: 16px; cursor: pointer; font-weight: 800; }
    .controls { display: grid; gap: 14px; padding: 0 16px 18px; }
    label { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 12px; font-size: 14px; }
    label output { color: #69665f; font-variant-numeric: tabular-nums; }
    input[type="range"] { grid-column: 1 / -1; width: 100%; accent-color: #00745c; }
    input[type="color"] { width: 52px; height: 34px; padding: 2px; border: 1px solid #ccc5b8; border-radius: 8px; background: white; }
    input[type="checkbox"] { width: 20px; height: 20px; accent-color: #00745c; }
    .hint { font-size: 13px; color: #77736a; line-height: 1.5; }
    @media (max-width: 820px) { main { grid-template-columns: 1fr; } .preview { position: static; } }
  </style>
</head>
<body>
  <header>
    <h1>Al Quran Brand Studio</h1>
    <p>Adjust every layer. Export a clean SVG or high-resolution PNG.</p>
  </header>
  <main>
    <section class="preview">
      <div class="canvas">
        <svg id="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" aria-label="Al Quran mark preview">
          <defs>
            <radialGradient id="bg" cx="50%" cy="44%" r="72%">
              <stop id="bgCenter" offset="0" stop-color="#176646"/>
              <stop id="bgEdge" offset="1" stop-color="#0A3A25"/>
            </radialGradient>
            <linearGradient id="markGold" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop id="goldStart" offset="0" stop-color="#F6E6AC"/>
              <stop id="goldMiddle" offset=".55" stop-color="#D9A62E"/>
              <stop id="goldEnd" offset="1" stop-color="#C68F1E"/>
            </linearGradient>
          </defs>
          <rect id="background" width="1024" height="1024" fill="url(#bg)"/>
          <g id="mark" fill="url(#markGold)">
            <path id="approvedMark" fill-rule="evenodd" d="M776 470 C768 540 740 610 682 652 C654 672 625 668 600 650 C570 628 550 580 516 548 C490 524 460 505 424 492 C414 545 420 594 450 626 C475 653 520 656 580 654 C560 675 510 692 468 692 C370 690 294 610 294 494 C294 384 370 294 484 294 C596 294 674 380 674 496 C674 540 660 580 634 616 L594 590 C614 558 624 526 624 488 C624 404 560 338 478 338 C394 338 342 402 342 490 C342 578 400 646 496 648 C462 634 438 614 428 584 C420 560 420 526 424 492 C470 496 514 518 548 548 C580 576 598 616 626 628 C650 638 676 622 696 594 C714 568 714 536 718 520 C740 510 760 490 776 470 Z"/>
          </g>
        </svg>
      </div>
      <div class="actions">
        <button class="primary" id="svgExport">Export SVG</button>
        <button id="pngExport">Export PNG</button>
        <button id="reset">Reset</button>
      </div>
      <p class="hint">Tip: switch off the background and export SVG for a transparent mark. PNG export is 2048 × 2048.</p>
    </section>

    <aside class="panel" id="controls">
      <details open>
        <summary>Background</summary>
        <div class="controls">
          <label>Visible <input data-kind="visibility" data-target="background" type="checkbox" checked></label>
          <label>Center color <input data-kind="color" data-target="bgCenter" type="color" value="#176646"></label>
          <label>Edge color <input data-kind="color" data-target="bgEdge" type="color" value="#0a3a25"></label>
          <label>Center X <output>50%</output><input data-kind="gradient" data-axis="cx" type="range" min="0" max="100" value="50"></label>
          <label>Center Y <output>44%</output><input data-kind="gradient" data-axis="cy" type="range" min="0" max="100" value="44"></label>
          <label>Radius <output>72%</output><input data-kind="gradient" data-axis="r" type="range" min="30" max="120" value="72"></label>
        </div>
      </details>

      <details open>
        <summary>Mark</summary>
        <div class="controls">
          <label>Gold start <input data-kind="color" data-target="goldStart" type="color" value="#f6e6ac"></label>
          <label>Gold middle <input data-kind="color" data-target="goldMiddle" type="color" value="#d9a62e"></label>
          <label>Gold end <input data-kind="color" data-target="goldEnd" type="color" value="#c68f1e"></label>
          <label>Gradient angle <output>45°</output><input id="angle" type="range" min="0" max="360" value="45"></label>
          <label>Scale <output>100%</output><input data-transform="scale" type="range" min="55" max="130" value="100"></label>
          <label>Rotation <output>0°</output><input data-transform="rotation" type="range" min="-30" max="30" value="0"></label>
          <label>Horizontal <output>0</output><input data-transform="x" type="range" min="-160" max="160" value="0"></label>
          <label>Vertical <output>0</output><input data-transform="y" type="range" min="-160" max="160" value="0"></label>
        </div>
      </details>

      <details open>
        <summary>Approved Q silhouette</summary>
        <div class="controls">
          <label>Visible <input data-kind="visibility" data-target="approvedMark" type="checkbox" checked></label>
          <label>Opacity <output>100%</output><input data-kind="opacity" data-target="approvedMark" type="range" min="0" max="100" value="100"></label>
        </div>
      </details>
    </aside>
  </main>

  <script>
    const svg = document.querySelector('#logo');
    const mark = document.querySelector('#mark');
    const initial = document.querySelector('#controls').innerHTML;
    const state = { scale: 100, rotation: 0, x: 0, y: 0 };

    function updateTransform() {
      const s = state.scale / 100;
      mark.setAttribute('transform', `translate(${512 + state.x} ${512 + state.y}) rotate(${state.rotation}) scale(${s}) translate(-512 -512)`);
    }

    function updateAngle(degrees) {
      const radians = (degrees - 90) * Math.PI / 180;
      const x = Math.cos(radians) * 50;
      const y = Math.sin(radians) * 50;
      const gradient = document.querySelector('#markGold');
      gradient.setAttribute('x1', `${50 - x}%`); gradient.setAttribute('y1', `${50 - y}%`);
      gradient.setAttribute('x2', `${50 + x}%`); gradient.setAttribute('y2', `${50 + y}%`);
    }

    function bind() {
      document.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', () => {
          const out = input.parentElement.querySelector('output');
          if (input.dataset.kind === 'color') document.querySelector(`#${input.dataset.target}`).setAttribute('stop-color', input.value);
          if (input.dataset.kind === 'visibility') document.querySelector(`#${input.dataset.target}`).style.display = input.checked ? '' : 'none';
          if (input.dataset.kind === 'gradient') { document.querySelector('#bg').setAttribute(input.dataset.axis, `${input.value}%`); if (out) out.value = `${input.value}%`; }
          if (input.dataset.kind === 'stroke') { document.querySelector(`#${input.dataset.target}`).setAttribute('stroke-width', input.value); if (out) out.value = input.value; }
          if (input.dataset.kind === 'opacity') { document.querySelector(`#${input.dataset.target}`).setAttribute('opacity', input.value / 100); if (out) out.value = `${input.value}%`; }
          if (input.dataset.transform) { state[input.dataset.transform] = Number(input.value); updateTransform(); if (out) out.value = input.dataset.transform === 'scale' ? `${input.value}%` : input.dataset.transform === 'rotation' ? `${input.value}°` : input.value; }
          if (input.id === 'angle') { updateAngle(Number(input.value)); if (out) out.value = `${input.value}°`; }
        });
      });
    }

    function download(blob, name) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = name; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function serializedSvg() {
      const clone = svg.cloneNode(true);
      clone.setAttribute('width', '1024'); clone.setAttribute('height', '1024');
      clone.removeAttribute('aria-label');
      return new XMLSerializer().serializeToString(clone);
    }

    document.querySelector('#svgExport').addEventListener('click', () => download(new Blob([serializedSvg()], { type: 'image/svg+xml' }), 'al-quran-mark.svg'));
    document.querySelector('#pngExport').addEventListener('click', () => {
      const image = new Image(); const source = URL.createObjectURL(new Blob([serializedSvg()], { type: 'image/svg+xml' }));
      image.onload = () => {
        const canvas = document.createElement('canvas'); canvas.width = canvas.height = 2048;
        canvas.getContext('2d').drawImage(image, 0, 0, 2048, 2048);
        URL.revokeObjectURL(source); canvas.toBlob(blob => download(blob, 'al-quran-mark-2048.png'), 'image/png');
      };
      image.src = source;
    });
    document.querySelector('#reset').addEventListener('click', () => {
      location.reload();
    });
    updateAngle(45); bind();
  </script>
</body>
</html>
