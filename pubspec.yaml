name: al_quran
description: "Al Quran — an ultra-lightweight Quran reader by Al Marfa Technologies: offline reading with optional audio recitation."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State (PRD 7.1: one-way state lifecycle via Cubit)
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Data (PRD 7.1: Drift over embedded SQLite)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24

  # Dependency injection (PRD 7.1: GetIt)
  get_it: ^7.7.0

  # Bundled-asset DB handling
  path_provider: ^2.1.3
  path: ^1.9.0
  shared_preferences: ^2.5.5
  share_plus: ^13.1.0
  # Open the developer website (almarfa.co) from the About screen.
  url_launcher: ^6.3.1
  # Real app version on the About screen (always matches pubspec — no manual sync).
  package_info_plus: ^10.1.0

  # Iconography — Material Symbols (Rounded), the single in-app icon family
  # (wired through core/theme/app_icons.dart). We ship our OWN tiny subset font
  # (assets/fonts/MaterialSymbolsRounded.ttf, ~115 KB) instead of the package's
  # 14 MB variable font: Flutter's release icon tree-shaking corrupts that 4-axis
  # variable font (blanking filled / non-default-size icons), so the package is a
  # dev-only dependency used at build time by tools/icon/subset_symbols.py. See
  # the fonts: block below and docs/brand.md. (Build release with
  # --no-tree-shake-icons so the bundled subset is left intact.)

  # Scroll-to-verse in the Detailed (lazy) list — resumes at the exact last-read
  # ayah even when its tile isn't built yet (Last Read resume).
  scrollable_positioned_list: ^0.3.8
  wakelock_plus: ^1.6.1
  adhan: ^2.0.0+1
  geolocator: ^14.0.3
  home_widget: ^0.9.3
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
  flutter_timezone: ^5.1.0

  # Audio recitation (behind FeatureFlags.audioRecitation). just_audio is pinned
  # to the 0.9.x line: 0.10.x requires Flutter >=3.27 / Dart >=3.6, above our
  # floor (environment below). LockCachingAudioSource (stream + cache) lives in
  # just_audio core. audio_session stays on the 0.1.x line just_audio 0.9.x
  # depends on (NOT 0.2.x) — it sets the iOS playback category so recitation is
  # audible with the silent switch on, and makes call-interruption pause reliable.
  just_audio: ^0.9.46
  audio_session: ^0.1.25

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.14.1
  patrol: ^4.6.1
  flutter_native_splash: ^2.4.7
  # Build-time only — the source of the Material Symbols Rounded variable font +
  # codepoints for tools/icon/subset_symbols.py. NOT bundled into the app (a
  # dev_dependency); the app uses our subset under assets/fonts/ instead.
  material_symbols_icons: ^4.2951.0

# Patrol end-to-end tests (integration_test/). Run with the patrol CLI on a
# device/emulator: `patrol test` (one-time native setup — see Makefile
# `e2e-setup` and LEARNINGS.md). app_name/ids match the package id.
patrol:
  app_name: Al Quran
  # Our E2E tests live in integration_test/ (the Flutter convention); patrol_cli
  # otherwise defaults to patrol_test/ and would mis-bundle the imports.
  test_directory: integration_test
  android:
    package_name: com.almarfa.alquran
  ios:
    bundle_id: com.almarfa.alquran

# App launcher icon — the calligraphic gold "Al Quran" Q mark on deep green.
# Master art (owner-approved raster) is assets/icon/icon.png; the editable brand
# kit lives in assets/brand/ (al-quran-mark.svg + studio). NOTE: per the brand
# guardrail, the launcher deliberately carries NO Quranic text (the earlier اقرأ
# wordmark was retired). The Android adaptive foreground/background are derived
# from icon.png by `python3 tools/icon/derive_adaptive.py` (keeps the Q inside the
# mask safe zone). Regenerate after editing: rerun that, then
# `dart run flutter_launcher_icons`.
flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  # Safety: if icon.png ever has transparent edges, flatten onto the brand green
  # (not white) so iOS never shows a white field.
  background_color_ios: "#093E26"
  # Android adaptive icon: flat green ground + the gold Q, kept within the central
  # safe zone so launcher masks (circle/squircle) don't clip the tail.
  adaptive_icon_background: "assets/icon/icon_background.png"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  min_sdk_android: 21

# Splash screen — deep-green field + the gold Q, matching the launcher icon (no
# Quranic text, per the brand guardrail). One config covers iOS, Android, and the
# Android 12+ splash API. The logo (assets/icon/splash_logo.png) is the Q on
# transparent, derived from icon.png by tools/icon/derive_adaptive.py and sized to
# read modestly full-screen. Regenerate: `dart run flutter_native_splash:create`.
flutter_native_splash:
  color: "#093E26"
  image: assets/icon/splash_logo.png
  android_12:
    color: "#093E26"
    image: assets/icon/splash_logo.png

flutter:
  uses-material-design: true

  assets:
    - assets/db/quran.db
    # Brand mark used by About and other in-app identity moments.
    - assets/icon/icon.png
    # Version marker (db_meta.built_at) used to re-seed the bundled DB on update.
    # Regenerate after replacing quran.db: `make seed-version`.
    - assets/db/quran.db.version

  # KFGQPC HAFS Uthmanic Script — UthmanicHafs1 Ver18 (Regular, weight 400), the
  # primary Arabic face (PRD 4.1). This is the regular-weight KFGQPC face the
  # quran.com web reader uses; it pairs with the `quran.ar.uthmani.v2.db` text we
  # ship — madd/tanween/sukun render from the bare QPC encoding (no grafting) and
  # the ayah-number digits compose into the ornate rosette. Regular weight (no
  # bold flag) so iOS matches it cleanly — unlike the Bold "1B Ver13" cut, which
  # rendered heavy and fell back to a system Naskh face when not declared as 700.
  # NOTE: licence is UNVERIFIED (KFGQPC terms) — clear before any public release
  # (see ../alquran-data/ATTRIBUTION.md).
  fonts:
    - family: UthmanicHafs
      fonts:
        - asset: assets/fonts/UthmanicHafs1-Ver18.ttf
    # IndoPak Quran face (Phase 2, behind FeatureFlags.indopakScript) — Noorehuda
    # by abu saad / noorehidayat.org. CC BY-NC (free, non-commercial, attribution
    # required) — see assets/fonts/README.md.
    - family: Noorehuda
      fonts:
        - asset: assets/fonts/Noorehuda.ttf
    # Urdu translation face — Noto Nastaliq Urdu (Google, SIL OFL — licence-clean).
    - family: NotoNastaliqUrdu
      fonts:
        - asset: assets/fonts/NotoNastaliqUrdu-Regular.ttf
    # Hindi translation face — Noto Sans Devanagari (Google, SIL OFL — licence-
    # clean). Static Regular instanced from the variable font so Hindi renders
    # crisply and consistently across devices instead of via the platform font.
    - family: NotoSansDevanagari
      fonts:
        - asset: assets/fonts/NotoSansDevanagari-Regular.ttf
    # Display serif for Latin headings (surah English name) — Playfair Display by
    # Claus Eggers Sørensen (Google Fonts, SIL OFL 1.1 — licence-clean).
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-SemiBold.ttf
    # In-app iconography — a correct ~115 KB subset of Material Symbols Rounded
    # (the variable axes FILL/wght/GRAD/opsz are preserved, unlike Flutter's
    # release tree-shaking). Referenced by core/theme/app_icons.dart; regenerate
    # with `python3 tools/icon/subset_symbols.py`. Release builds MUST pass
    # --no-tree-shake-icons (see Makefile `apk`/`aab` + the release workflow).
    - family: MaterialSymbolsRounded
      fonts:
        - asset: assets/fonts/MaterialSymbolsRounded.ttf
