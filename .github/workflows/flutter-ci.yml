name: Flutter CI

# Runs on develop (day-to-day work) and main (escape-hatch/manual pushes).
# Note: the release workflow's own bot-token pushes (promote, version bump,
# sync) do NOT trigger CI — GitHub suppresses workflow runs for GITHUB_TOKEN
# pushes — so main won't show a fresh CI run right after a release.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.1
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # *.g.dart (Drift) is gitignored, so generate it before analyze/test.
      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze --fatal-warnings

      - name: Test
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          # Public repo → tokenless upload works; the secret is used when set.
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
